ServerName localhost

<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    <Directory /var/www/html/public>
        AllowOverride None
        Require all granted
        Options FollowSymLinks
        DirectorySlash Off

        RewriteEngine On

        # Strip trailing slashes (canonical URLs)
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} (.+)/$
        RewriteRule ^ %1 [L,R=301]

        # Laravel front-controller: send all non-file/dir requests to index.php
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    # Allow serving static assets that public/ symlinks point to (css/js from resources/)
    <Directory /var/www/html/resources/css>
        Require all granted
        Options FollowSymLinks
    </Directory>
    <Directory /var/www/html/resources/js>
        Require all granted
        Options FollowSymLinks
    </Directory>

    # Forward PHP requests to PHP-FPM
    <FilesMatch "\.php$">
        SetHandler "proxy:fcgi://php:9000"
    </FilesMatch>
</VirtualHost>
